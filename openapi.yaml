openapi: 3.0.3
info:
  title: E-CRF Early Development Trial API
  description: |
    REST API for the Electronic Case Report Form (E-CRF) clinical trial management system.
    Most endpoints require authentication via session cookie (Better Auth).
    Study-scoped endpoints require an active study context (x-study-id header or query param).
  version: 1.0.0
  contact:
    email: renfael6@gmail.com

servers:
  - url: http://localhost:3000
    description: Local development server

security:
  - sessionCookie: []

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: better-auth.session_token

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    Reason:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    Study:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        protocolNo:
          type: string
        phase:
          type: string
        sponsor:
          type: string
        indication:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    Subject:
      type: object
      properties:
        id:
          type: string
        subjectCode:
          type: string
        siteId:
          type: string
        initials:
          type: string
        dateOfBirth:
          type: string
          format: date
        sex:
          type: string
          enum: [M, F, Other]
        enrolledAt:
          type: string
          format: date-time
        status:
          type: string

    Visit:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        visitName:
          type: string
        visitOrder:
          type: integer
        visitType:
          type: string
        plannedDate:
          type: string
          format: date
        actualDate:
          type: string
          format: date
        windowDays:
          type: integer
        status:
          type: string

    Form:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string
        schemaJson:
          type: object
        isActive:
          type: boolean

    Entry:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        visitId:
          type: string
        formId:
          type: string
        dataJson:
          type: object
        isLocked:
          type: boolean

    Query:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        visitId:
          type: string
        formId:
          type: string
        entryId:
          type: string
        fieldKey:
          type: string
        fieldLabel:
          type: string
        queryText:
          type: string
        status:
          type: string
          enum: [Open, Resolved, Closed]

    AdverseEvent:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        aeTerm:
          type: string
        meddraPt:
          type: string
        severity:
          type: string
        isSerious:
          type: boolean
        onsetDate:
          type: string
          format: date
        outcome:
          type: string
        status:
          type: string

    Deviation:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        deviationType:
          type: string
        category:
          type: string
        description:
          type: string
        deviationDate:
          type: string
          format: date
        status:
          type: string

    Site:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        country:
          type: string
        piName:
          type: string
        status:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, pi, investigator, cra, data_manager, crc]
        siteId:
          type: string

paths:

  # ── Health ──────────────────────────────────────────────
  /api/health:
    get:
      summary: Health check
      security: []
      tags: [System]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ── Auth / MFA ───────────────────────────────────────────
  /api/mfa/initiate:
    post:
      summary: MFA step 1 — verify password
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Returns tempToken for step 2

  /api/mfa/totp-verify:
    post:
      summary: MFA step 2 — verify TOTP code
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tempToken, totpCode]
              properties:
                tempToken:
                  type: string
                totpCode:
                  type: string
      responses:
        "200":
          description: Login successful, session created

  /api/mfa/direct-login:
    post:
      summary: Direct login without MFA
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful

  /api/mfa/totp/status:
    get:
      summary: Check TOTP setup status
      tags: [Auth]
      responses:
        "200":
          description: TOTP status

  /api/mfa/totp/enable:
    post:
      summary: Enable TOTP
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [totpCode]
              properties:
                totpCode:
                  type: string
      responses:
        "200":
          description: TOTP enabled

  /api/mfa/totp/disable:
    delete:
      summary: Disable TOTP
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [totpCode]
              properties:
                totpCode:
                  type: string
      responses:
        "200":
          description: TOTP disabled

  # ── Register ─────────────────────────────────────────────
  /api/register:
    post:
      summary: Self-register new user
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                role:
                  type: string
      responses:
        "201":
          description: User registered

  # ── Studies ───────────────────────────────────────────────
  /api/studies:
    get:
      summary: List studies
      tags: [Studies]
      responses:
        "200":
          description: Array of studies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Study"
    post:
      summary: Create study (admin only)
      tags: [Studies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, protocolNo]
              properties:
                title:
                  type: string
                protocolNo:
                  type: string
                phase:
                  type: string
                sponsor:
                  type: string
                indication:
                  type: string
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
      responses:
        "201":
          description: Study created

  /api/studies/{id}:
    patch:
      summary: Update study
      tags: [Studies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/Study"
                - $ref: "#/components/schemas/Reason"
      responses:
        "200":
          description: Study updated

  /api/studies/{id}/users:
    get:
      summary: List users assigned to study (admin only)
      tags: [Studies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of users
    post:
      summary: Assign user to study (admin only)
      tags: [Studies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
      responses:
        "201":
          description: User assigned

  /api/studies/{id}/users/{userId}:
    delete:
      summary: Remove user from study
      tags: [Studies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User removed

  # ── Sites ────────────────────────────────────────────────
  /api/sites:
    get:
      summary: List sites
      tags: [Sites]
      responses:
        "200":
          description: Array of sites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Site"
    post:
      summary: Create site (admin only)
      tags: [Sites]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code]
              properties:
                name:
                  type: string
                code:
                  type: string
                country:
                  type: string
                piName:
                  type: string
      responses:
        "201":
          description: Site created

  /api/sites/{id}:
    patch:
      summary: Update site
      tags: [Sites]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                country:
                  type: string
                piName:
                  type: string
                status:
                  type: string
      responses:
        "200":
          description: Site updated

  # ── Subjects ─────────────────────────────────────────────
  /api/subjects:
    get:
      summary: List subjects
      tags: [Subjects]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Array of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"
    post:
      summary: Enroll new subject
      tags: [Subjects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subjectCode, siteId, initials, sex]
              properties:
                subjectCode:
                  type: string
                siteId:
                  type: string
                initials:
                  type: string
                dateOfBirth:
                  type: string
                  format: date
                sex:
                  type: string
                  enum: [M, F, Other]
                enrolledAt:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Subject enrolled

  /api/subjects/status-overview:
    get:
      summary: Aggregate status overview (entries, signatures, queries per subject)
      tags: [Subjects]
      responses:
        "200":
          description: Status overview

  /api/subjects/{id}:
    get:
      summary: Get subject detail with visits
      tags: [Subjects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subject detail

  /api/subjects/{id}/status:
    patch:
      summary: Withdraw or complete subject
      tags: [Subjects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status, reason]
              properties:
                status:
                  type: string
                  enum: [Withdrawn, Completed]
                reason:
                  type: string
      responses:
        "200":
          description: Status updated

  /api/subjects/{id}/ie-assessment:
    get:
      summary: Get I/E assessment history
      tags: [Subjects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Assessment history
    post:
      summary: Record I/E assessment
      tags: [Subjects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [criteriaJson, passed]
              properties:
                criteriaJson:
                  type: array
                  items:
                    type: object
                passed:
                  type: boolean
      responses:
        "201":
          description: Assessment recorded

  # ── Visits ───────────────────────────────────────────────
  /api/subjects/{subjectId}/visits:
    get:
      summary: List visits for subject
      tags: [Visits]
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of visits
    post:
      summary: Create visit
      tags: [Visits]
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visitName, visitOrder, visitType]
              properties:
                visitName:
                  type: string
                visitOrder:
                  type: integer
                visitType:
                  type: string
                plannedDate:
                  type: string
                  format: date
                actualDate:
                  type: string
                  format: date
                windowDays:
                  type: integer
                formIds:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                missedReason:
                  type: string
                notes:
                  type: string
      responses:
        "201":
          description: Visit created

  /api/subjects/{subjectId}/visits/{id}:
    patch:
      summary: Update visit
      tags: [Visits]
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Visit"
      responses:
        "200":
          description: Visit updated
    delete:
      summary: Delete visit
      tags: [Visits]
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Reason"
      responses:
        "200":
          description: Visit deleted

  /api/subjects/{subjectId}/visits/{id}/status:
    patch:
      summary: Update visit status
      tags: [Visits]
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
      responses:
        "200":
          description: Status updated

  # ── Forms ────────────────────────────────────────────────
  /api/forms:
    get:
      summary: List CRF forms
      tags: [Forms]
      parameters:
        - name: all
          in: query
          description: "Admin only: pass 1 to include inactive"
          schema:
            type: integer
      responses:
        "200":
          description: Array of forms
    post:
      summary: Create form template (admin only)
      tags: [Forms]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, version, schemaJson]
              properties:
                name:
                  type: string
                description:
                  type: string
                version:
                  type: string
                schemaJson:
                  type: object
      responses:
        "201":
          description: Form created

  /api/forms/{id}:
    get:
      summary: Get form with schema
      tags: [Forms]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Form detail
    put:
      summary: Update form (versioned)
      tags: [Forms]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/Form"
                - $ref: "#/components/schemas/Reason"
      responses:
        "200":
          description: Form updated
    delete:
      summary: Hard delete form (only if no data entries)
      tags: [Forms]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Reason"
      responses:
        "200":
          description: Form deleted

  /api/forms/{id}/status:
    patch:
      summary: Activate or deactivate form
      tags: [Forms]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isActive, reason]
              properties:
                isActive:
                  type: boolean
                reason:
                  type: string
      responses:
        "200":
          description: Status updated

  # ── Entries ──────────────────────────────────────────────
  /api/entries:
    get:
      summary: List CRF entries
      tags: [Entries]
      parameters:
        - name: subjectId
          in: query
          schema:
            type: string
        - name: visitId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Array of entries
    post:
      summary: Upsert CRF entry
      tags: [Entries]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subjectId, visitId, formId, dataJson]
              properties:
                subjectId:
                  type: string
                visitId:
                  type: string
                formId:
                  type: string
                dataJson:
                  type: object
                reason:
                  type: string
      responses:
        "200":
          description: Entry upserted

  /api/entries/{id}/lock:
    patch:
      summary: Lock entry
      tags: [Entries]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Reason"
      responses:
        "200":
          description: Entry locked

  /api/entries/{id}/unlock:
    patch:
      summary: Unlock entry (admin only)
      tags: [Entries]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Reason"
      responses:
        "200":
          description: Entry unlocked

  # ── Queries ──────────────────────────────────────────────
  /api/queries:
    get:
      summary: List queries
      tags: [Queries]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: subjectId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Array of queries
    post:
      summary: Raise query
      tags: [Queries]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subjectId, queryText]
              properties:
                subjectId:
                  type: string
                visitId:
                  type: string
                formId:
                  type: string
                entryId:
                  type: string
                fieldKey:
                  type: string
                fieldLabel:
                  type: string
                queryText:
                  type: string
      responses:
        "201":
          description: Query raised

  /api/queries/{id}/resolve:
    patch:
      summary: Resolve query
      tags: [Queries]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resolutionText]
              properties:
                resolutionText:
                  type: string
      responses:
        "200":
          description: Query resolved

  /api/queries/{id}/close:
    patch:
      summary: Close resolved query (CRA/admin only)
      tags: [Queries]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Query closed

  # ── Signatures ───────────────────────────────────────────
  /api/signatures:
    get:
      summary: List signatures for an entry
      tags: [Signatures]
      parameters:
        - name: entryId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Array of signatures
    post:
      summary: E-sign entry
      tags: [Signatures]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entryId, password, meaning]
              properties:
                entryId:
                  type: string
                password:
                  type: string
                meaning:
                  type: string
      responses:
        "201":
          description: Signature recorded

  # ── Audit ────────────────────────────────────────────────
  /api/audit:
    get:
      summary: List audit trail
      tags: [Audit]
      parameters:
        - name: action
          in: query
          schema:
            type: string
        - name: tableName
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Audit records

  # ── Dashboard ────────────────────────────────────────────
  /api/dashboard/stats:
    get:
      summary: Dashboard statistics
      tags: [Dashboard]
      responses:
        "200":
          description: Stats object
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalSubjects:
                    type: integer
                  activeSubjects:
                    type: integer
                  pendingForms:
                    type: integer
                  openQueries:
                    type: integer
                  totalVisits:
                    type: integer

  # ── Adverse Events ───────────────────────────────────────
  /api/ae:
    get:
      summary: List adverse events
      tags: [Adverse Events]
      parameters:
        - name: subjectId
          in: query
          schema:
            type: string
        - name: serious
          in: query
          schema:
            type: boolean
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Array of adverse events
    post:
      summary: Create adverse event
      tags: [Adverse Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subjectId, aeTerm, severity, isSerious, onsetDate, causality]
              properties:
                subjectId:
                  type: string
                aeTerm:
                  type: string
                meddraPt:
                  type: string
