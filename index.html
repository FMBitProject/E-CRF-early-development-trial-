<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CRF System</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231e3a5f'/%3E%3Cpath d='M10 9h8a5 5 0 0 1 0 10h-8zm2 2v6h6a3 3 0 0 0 0-6z' fill='white'/%3E%3Crect x='10' y='21' width='10' height='2' rx='1' fill='white'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="src/frontend/css/style.css">
</head>
<body class="h-full overflow-hidden" style="background:#F0F3F8">

    <div id="app" class="flex h-screen overflow-hidden">

        <aside id="sidebar" class="w-60 flex-shrink-0 flex flex-col shadow-lg">
            <div class="h-14 px-4 flex items-center gap-3 flex-shrink-0" style="border-bottom:1px solid rgba(255,255,255,0.07)">
                <div class="w-8 h-8 rounded-md bg-white/10 flex items-center justify-center border border-white/15 flex-shrink-0">
                    <i data-lucide="clipboard-list" class="w-4 h-4 text-white"></i>
                </div>
                <div class="min-w-0">
                    <p class="text-white text-sm font-bold leading-none tracking-tight">E-CRF System</p>
                    <p class="text-blue-300 text-xs mt-0.5 leading-none">Clinical Data</p>
                </div>
            </div>

            <!-- Active site chip -->
            <div id="sidebar-site-context" class="px-2 pt-2 pb-1 flex-shrink-0"></div>

            <!-- Scroll wrapper -->
            <div class="flex-1 relative flex flex-col min-h-0" id="sidebar-nav-wrap">
                <!-- Scroll up button -->
                <button id="nav-scroll-up"
                    class="absolute top-0 left-0 right-0 z-10 hidden flex items-center justify-center h-7
                           bg-gradient-to-b from-[#0A2E5C] to-transparent pointer-events-auto"
                    aria-label="Scroll up">
                    <span class="flex items-center gap-1 px-3 py-0.5 rounded-full bg-white/10 border border-white/15 text-white/80 hover:text-white hover:bg-white/20 transition text-xs">
                        <i data-lucide="chevron-up" class="w-3.5 h-3.5"></i>
                    </span>
                </button>

                <nav class="flex-1 px-2 py-3 overflow-y-auto sidebar-nav-scroll" id="sidebar-nav"
                     style="scrollbar-width:none; -ms-overflow-style:none;">
                </nav>

                <!-- Scroll down button -->
                <button id="nav-scroll-down"
                    class="absolute bottom-0 left-0 right-0 z-10 hidden flex items-center justify-center h-7
                           bg-gradient-to-t from-[#0A2E5C] to-transparent pointer-events-auto"
                    aria-label="Scroll down">
                    <span class="flex items-center gap-1 px-3 py-0.5 rounded-full bg-white/10 border border-white/15 text-white/80 hover:text-white hover:bg-white/20 transition text-xs">
                        <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
                    </span>
                </button>
            </div>

            <div class="px-2 pb-3 flex-shrink-0" style="border-top:1px solid rgba(255,255,255,0.07)">
                <div id="sidebar-user" class="pt-3">
                    </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden min-w-0">

            <header class="bg-white h-14 flex items-center px-5 flex-shrink-0" style="border-bottom:1px solid #D8E0EE; box-shadow:0 1px 3px rgba(10,46,92,0.06)">
                <div id="breadcrumb" class="flex items-center gap-1.5 text-sm text-slate-500 min-w-0">
                    </div>
                <div class="ml-auto flex items-center gap-3" id="header-actions">
                    <!-- Notification Bell -->
                    <div class="relative" id="notif-bell-wrap">
                      <button id="notif-bell-btn" onclick="window.toggleNotifPanel()" title="Alerts & Notifications"
                        class="relative p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition">
                        <i data-lucide="bell" class="w-4 h-4"></i>
                        <span id="notif-badge" class="hidden absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center leading-none"></span>
                      </button>
                      <!-- Dropdown panel -->
                      <div id="notif-panel" class="hidden absolute right-0 top-10 w-80 bg-white rounded-xl shadow-2xl border border-slate-100 z-50 overflow-hidden">
                        <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100">
                          <p class="text-sm font-semibold text-slate-800">Alerts</p>
                          <button onclick="window.refreshNotifications()" class="text-xs text-blue-600 hover:underline">Refresh</button>
                        </div>
                        <div id="notif-list" class="max-h-80 overflow-y-auto divide-y divide-slate-50">
                          <p class="text-xs text-slate-400 text-center py-6">Loading...</p>
                        </div>
                      </div>
                    </div>
                    </div>
            </header>

            <div id="study-status-banner" class="hidden flex-shrink-0"></div>

            <div class="compliance-bar flex items-center gap-4 flex-shrink-0">
                <span><i data-lucide="shield-check" class="w-3 h-3 inline mr-1"></i>FDA 21 CFR Part 11</span>
                <span class="opacity-40">|</span>
                <span>ICH GCP E6 (R2)</span>
                <span class="opacity-40">|</span>
                <span>Audit Trail Active</span>
            </div>

            <main class="flex-1 overflow-y-auto" id="main-content">
                <div class="flex items-center justify-center h-full">
                    <div class="text-center">
                        <div class="w-9 h-9 border-3 border-blue-700 border-t-transparent rounded-full animate-spin mx-auto mb-3" style="border-width:3px"></div>
                        <p class="text-slate-500 text-sm">Loading…</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="modal-root"></div>

    <div id="toast-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-2 pointer-events-none"></div>

<script type="module" src="src/frontend/js/app.js"></script>

<style>
    .sidebar-nav-scroll::-webkit-scrollbar { display: none; }
</style>

<script>
(function () {
    const SCROLL_STEP = 120;

    function initNavScroll() {
        const nav  = document.getElementById('sidebar-nav');
        const btnU = document.getElementById('nav-scroll-up');
        const btnD = document.getElementById('nav-scroll-down');
        if (!nav || !btnU || !btnD) return;

        function update() {
            const atTop    = nav.scrollTop <= 4;
            const atBottom = nav.scrollTop + nav.clientHeight >= nav.scrollHeight - 4;
            btnU.classList.toggle('hidden', atTop);
            btnD.classList.toggle('hidden', atBottom);
        }

        nav.addEventListener('scroll', update, { passive: true });

        btnU.addEventListener('click', () => {
            nav.scrollBy({ top: -SCROLL_STEP, behavior: 'smooth' });
        });
        btnD.addEventListener('click', () => {
            nav.scrollBy({ top: SCROLL_STEP, behavior: 'smooth' });
        });

        // Re-check whenever the sidebar re-renders (nav items change)
        new MutationObserver(update).observe(nav, { childList: true, subtree: true });

        update();
    }

    // Wait for DOM + deferred lucide, then init
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initNavScroll);
    } else {
        initNavScroll();
    }
})();
</script>
</body>
</html>
